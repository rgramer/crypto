name: Temporary DOCX Builder

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/temp-build-word-docx.yml'

permissions:
  contents: write

jobs:
  build-docx:
    runs-on: ubuntu-latest
    steps:
      - name: Check out temporary artifact branch
        uses: actions/checkout@v4
        with:
          ref: temporary-word-artifact
          fetch-depth: 0

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Convert to a real DOCX file
        run: |
          mkdir -p converted
          libreoffice --headless --convert-to docx --outdir converted Metro_State_University_Midterm_Model_Answer.doc
          test -f converted/Metro_State_University_Midterm_Model_Answer.docx
          cp converted/Metro_State_University_Midterm_Model_Answer.docx ./Metro_State_University_Midterm_Model_Answer.docx

      - name: Commit DOCX to temporary artifact branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Metro_State_University_Midterm_Model_Answer.docx
          if git diff --cached --quiet; then
            echo 'No DOCX changes to commit.'
          else
            git commit -m 'Generate actual Word DOCX artifact'
            git push origin HEAD:temporary-word-artifact
          fi
