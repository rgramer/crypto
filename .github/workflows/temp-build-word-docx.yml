name: Temporary DOCX Builder

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - '.github/workflows/temp-build-word-docx.yml'

permissions:
  contents: write

jobs:
  build-docx:
    runs-on: ubuntu-latest
    steps:
      - name: Check out temporary artifact branch
        uses: actions/checkout@v4
        with:
          ref: temporary-word-artifact
          fetch-depth: 0

      - name: Convert HTML-based Word document to a real DOCX
        uses: docker://pandoc/core:latest
        with:
          args: >-
            Metro_State_University_Midterm_Model_Answer.doc
            --from=html
            --to=docx
            --output=Metro_State_University_Midterm_Model_Answer.docx

      - name: Validate and commit DOCX to temporary artifact branch
        run: |
          test -s Metro_State_University_Midterm_Model_Answer.docx
          file Metro_State_University_Midterm_Model_Answer.docx
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Metro_State_University_Midterm_Model_Answer.docx
          if git diff --cached --quiet; then
            echo 'No DOCX changes to commit.'
          else
            git commit -m 'Generate actual Word DOCX artifact'
            git push origin HEAD:temporary-word-artifact
          fi
