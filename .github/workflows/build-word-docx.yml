name: Build Word DOCX

on:
  push:
    branches:
      - temporary-word-artifact
    paths:
      - 'Metro_State_University_Midterm_Model_Answer.doc'
      - '.github/workflows/build-word-docx.yml'

permissions:
  contents: write

jobs:
  build-docx:
    runs-on: ubuntu-latest
    steps:
      - name: Check out temporary artifact branch
        uses: actions/checkout@v4

      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice

      - name: Convert the Word-compatible document to DOCX
        run: |
          mkdir -p converted
          libreoffice --headless --convert-to docx --outdir converted Metro_State_University_Midterm_Model_Answer.doc
          test -f converted/Metro_State_University_Midterm_Model_Answer.docx
          cp converted/Metro_State_University_Midterm_Model_Answer.docx ./Metro_State_University_Midterm_Model_Answer.docx

      - name: Commit the generated DOCX
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Metro_State_University_Midterm_Model_Answer.docx
          if git diff --cached --quiet; then
            echo 'No DOCX changes to commit.'
          else
            git commit -m 'Generate actual Word DOCX artifact'
            git push
          fi
